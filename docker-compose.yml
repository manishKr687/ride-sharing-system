version: '3.8'

services:

  postgres:
    image: postgres:14
    container_name: ride-sharing-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ride-sharing-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - ride-sharing-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    networks:
      - ride-sharing-network

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    ports:
      - "7072:7072"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_service
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ride-sharing-network

  ride-service:
    build:
      context: .
      dockerfile: ride-service/Dockerfile
    container_name: ride-service
    ports:
      - "7071:7071"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ride_service
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVICES_DRIVER_SERVICE_BASE_URL: http://user-service:7072
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - ride-sharing-network

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    ports:
      - "7075:7075"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment_service
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - ride-sharing-network

  billing-service:
    build:
      context: .
      dockerfile: billing-service/Dockerfile
    container_name: billing-service
    ports:
      - "7076:7076"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/billing_service
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - ride-sharing-network

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    ports:
      - "7074:7074"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notification_service
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      NOTIFICATION_RECIPIENT_EMAIL: ${NOTIFICATION_RECIPIENT_EMAIL}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - ride-sharing-network

  location-service:
    build:
      context: .
      dockerfile: location-service/Dockerfile
    container_name: location-service
    ports:
      - "7077:7077"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/location_service
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - ride-sharing-network

  matching-service:
    build:
      context: .
      dockerfile: matching-service/Dockerfile
    container_name: matching-service
    ports:
      - "7078:7078"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DRIVER_SERVICE_URL: http://user-service:7072
      RIDE_SERVICE_URL: http://ride-service:7071
    depends_on:
      kafka:
        condition: service_started
      user-service:
        condition: service_started
      ride-service:
        condition: service_started
    networks:
      - ride-sharing-network

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      USER_SERVICE_URL: http://user-service:7072
      DRIVER_SERVICE_URL: http://user-service:7072
      RIDE_SERVICE_URL: http://ride-service:7071
      PAYMENT_SERVICE_URL: http://payment-service:7075
      LOCATION_SERVICE_URL: http://location-service:7077
    depends_on:
      user-service:
        condition: service_started
      ride-service:
        condition: service_started
      payment-service:
        condition: service_started
      location-service:
        condition: service_started
    networks:
      - ride-sharing-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "5173:5173"
    environment:
      VITE_GATEWAY_URL: http://localhost:8080
    depends_on:
      - api-gateway
    networks:
      - ride-sharing-network

networks:
  ride-sharing-network:
    driver: bridge
